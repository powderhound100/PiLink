# PiLink Configuration
# Edit these values for your setup, or override with environment variables.

# SSH host — must match an entry in ~/.ssh/config, or use user@ip directly
HOST="pi"

# Systemd service name to manage (leave empty if none)
SERVICE="groundlink-pi"

# Remote directory for git-based OTA deploys (leave empty to disable)
DEPLOY_DIR="/opt/groundlink"
